build:
  version: "1.0.0"
server:
  port: 9000
spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driverClassName: org.h2.Driver
    username: sa
    password: ''
  h2:
    console:
      enabled: true
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
  config:
    import: "optional:configserver:http://configserver:8071"
  application:
    name: "cards"
  profiles:
    active: "prod"
  rabbitmq:
    host: "rabbit"
    port: 5672
    username: "guest"
    password: "guest"
management:
  endpoints:
    web:
      exposure:
        include: "*"

contact:
  message: "Welcome to esebray cards service default from github"
  contact_info:
    name: "Daniel Esebre"
    email: "sunday.esebre@company.com cards"
  onCallSupport:
    - 333333333
    - 22222222
